<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-label="Presigned URL concept">
  <rect width="1200" height="700" fill="#f8fafc"/>
  <text x="600" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="38" font-weight="700" fill="#0f172a">Presigned URL = ใบอนุญาตชั่วคราว</text>
  <rect x="80" y="170" width="300" height="360" rx="28" fill="#ffffff" stroke="#cbd5e1" stroke-width="4"/>
  <circle cx="230" cy="275" r="58" fill="#e0f2fe" stroke="#0284c7" stroke-width="4"/>
  <path d="M210 275h40M230 255v40" stroke="#0284c7" stroke-width="10" stroke-linecap="round"/>
  <text x="230" y="390" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#075985">Frontend</text>
  <text x="230" y="430" text-anchor="middle" font-family="Arial, sans-serif" font-size="21" fill="#334155">ไม่มี secret key</text>
  <rect x="450" y="170" width="300" height="360" rx="28" fill="#ffffff" stroke="#cbd5e1" stroke-width="4"/>
  <rect x="540" y="235" width="120" height="90" rx="18" fill="#dcfce7" stroke="#16a34a" stroke-width="4"/>
  <circle cx="600" cy="280" r="20" fill="#16a34a"/>
  <text x="600" y="390" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#14532d">Backend</text>
  <text x="600" y="430" text-anchor="middle" font-family="Arial, sans-serif" font-size="21" fill="#334155">ถือ secret และ sign</text>
  <rect x="820" y="170" width="300" height="360" rx="28" fill="#ffffff" stroke="#cbd5e1" stroke-width="4"/>
  <rect x="910" y="230" width="120" height="120" rx="20" fill="#ffedd5" stroke="#ea580c" stroke-width="4"/>
  <path d="M910 270h120" stroke="#ea580c" stroke-width="4"/>
  <text x="970" y="390" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#9a3412">Storage</text>
  <text x="970" y="430" text-anchor="middle" font-family="Arial, sans-serif" font-size="21" fill="#334155">รับเฉพาะ URL ที่ถูก sign</text>
  <path d="M380 260h68" stroke="#334155" stroke-width="5" marker-end="url(#arrow)"/>
  <text x="415" y="235" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#334155">ขอสิทธิ์</text>
  <path d="M450 330h-68" stroke="#334155" stroke-width="5" marker-end="url(#arrow)"/>
  <text x="415" y="365" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#334155">URL 5 นาที</text>
  <path d="M380 510 C570 620,760 620,920 525" stroke="#0f766e" stroke-width="7" fill="none" marker-end="url(#arrowGreen)"/>
  <text x="640" y="640" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#0f766e">Frontend ใช้ URL ชั่วคราว upload ตรง</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#0f766e"/>
    </marker>
  </defs>
</svg>
