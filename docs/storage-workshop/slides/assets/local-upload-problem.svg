  <text x="435" y="360" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#0f172a">Balancer</text>
  <rect x="650" y="150" width="240" height="150" rx="22" fill="#dcfce7" stroke="#16a34a" stroke-width="4"/>
