  <rect x="650" y="400" width="240" height="150" rx="22" fill="#fee2e2" stroke="#dc2626" stroke-width="4"/>
  <text x="770" y="455" text-anchor="middle" font-family="Arial, sans-serif" font-size="27" font-weight="700" fill="#7f1d1d">Backend B</text>
  <text x="770" y="500" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" fill="#991b1b">ไม่มีไฟล์นี้</text>
  <rect x="970" y="275" width="160" height="120" rx="22" fill="#ede9fe" stroke="#7c3aed" stroke-width="4"/>
