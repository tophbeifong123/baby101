  <path d="M250 335h78" stroke="#334155" stroke-width="5" marker-end="url(#arrow)"/>
  <path d="M540 315 C590 220,610 225,650 225" stroke="#334155" stroke-width="5" fill="none" marker-end="url(#arrow)"/>
  <path d="M540 355 C590 465,610 475,650 475" stroke="#334155" stroke-width="5" fill="none" marker-end="url(#arrow)"/>
