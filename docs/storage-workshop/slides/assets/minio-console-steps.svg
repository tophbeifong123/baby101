<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-label="MinIO console steps">
  <rect width="1200" height="700" fill="#f8fafc"/>
  <text x="600" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="38" font-weight="700" fill="#0f172a">Lab 1: สร้าง bucket และลอง upload ใน Console</text>
  <rect x="85" y="125" width="1030" height="480" rx="24" fill="#ffffff" stroke="#cbd5e1" stroke-width="4"/>
  <rect x="85" y="125" width="1030" height="58" rx="24" fill="#111827"/>
  <circle cx="128" cy="154" r="9" fill="#ef4444"/>
  <circle cx="158" cy="154" r="9" fill="#f59e0b"/>
  <circle cx="188" cy="154" r="9" fill="#22c55e"/>
  <text x="260" y="162" font-family="Arial, sans-serif" font-size="20" fill="#e5e7eb">http://localhost:9001</text>
  <rect x="120" y="215" width="210" height="330" rx="18" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="3"/>
  <text x="225" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#0f172a">Login</text>
  <text x="225" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="21" fill="#334155">minioadmin</text>
  <text x="225" y="360" text-anchor="middle" font-family="Arial, sans-serif" font-size="21" fill="#334155">minioadmin</text>
  <rect x="380" y="215" width="310" height="330" rx="18" fill="#eff6ff" stroke="#2563eb" stroke-width="3"/>
  <text x="535" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#1e3a8a">Buckets</text>
  <rect x="430" y="315" width="210" height="64" rx="14" fill="#2563eb"/>
  <text x="535" y="356" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#ffffff">Create Bucket</text>
  <text x="535" y="430" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" fill="#334155">club-assets</text>
  <rect x="740" y="215" width="335" height="330" rx="18" fill="#ecfdf5" stroke="#16a34a" stroke-width="3"/>
  <text x="908" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#14532d">Object Browser</text>
  <rect x="798" y="315" width="220" height="64" rx="14" fill="#16a34a"/>
  <text x="908" y="356" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#ffffff">Upload</text>
  <text x="908" y="430" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" fill="#334155">เลือกไฟล์ 1 รูป</text>
  <text x="908" y="470" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" fill="#334155">ดู object key</text>
  <path d="M330 380h46" stroke="#334155" stroke-width="5" marker-end="url(#arrow)"/>
  <path d="M690 380h46" stroke="#334155" stroke-width="5" marker-end="url(#arrow)"/>
  <text x="600" y="655" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#0f172a">เป้าหมาย: น้องเห็นว่า bucket เป็นกล่อง และ object key คือชื่อของไฟล์ในกล่อง</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
  </defs>
</svg>
