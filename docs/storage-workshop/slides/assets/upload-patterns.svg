<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-label="Upload patterns comparison">
  <rect width="1200" height="700" fill="#f8fafc"/>
  <text x="600" y="66" text-anchor="middle" font-family="Arial, sans-serif" font-size="38" font-weight="700" fill="#0f172a">Upload file มี 2 pattern ที่เจอบ่อย</text>
  <g transform="translate(70 125)">
    <rect width="500" height="470" rx="26" fill="#fff7ed" stroke="#f97316" stroke-width="4"/>
    <text x="250" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#9a3412">Pattern A: ผ่าน Backend</text>
    <rect x="50" y="125" width="120" height="70" rx="16" fill="#e0f2fe" stroke="#0284c7" stroke-width="3"/>
    <text x="110" y="168" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#075985">Frontend</text>
    <rect x="190" y="125" width="120" height="70" rx="16" fill="#dcfce7" stroke="#16a34a" stroke-width="3"/>
    <text x="250" y="168" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#14532d">Backend</text>
    <rect x="330" y="125" width="120" height="70" rx="16" fill="#ffedd5" stroke="#ea580c" stroke-width="3"/>
    <text x="390" y="168" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#9a3412">Storage</text>
    <path d="M170 160h18" stroke="#334155" stroke-width="4" marker-end="url(#arrow)"/>
    <path d="M310 160h18" stroke="#334155" stroke-width="4" marker-end="url(#arrow)"/>
    <text x="250" y="255" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" fill="#334155">เข้าใจง่าย แต่ไฟล์ใหญ่ทำให้ backend หนัก</text>
    <text x="250" y="305" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" fill="#334155">เหมาะกับ demo เล็กหรือไฟล์เล็กมาก</text>
    <text x="250" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#9a3412">วันนี้ใช้เป็น stepping stone</text>
  </g>
  <g transform="translate(630 125)">
    <rect width="500" height="470" rx="26" fill="#ecfdf5" stroke="#16a34a" stroke-width="4"/>
    <text x="250" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#14532d">Pattern B: Presigned URL</text>
    <rect x="50" y="125" width="120" height="70" rx="16" fill="#e0f2fe" stroke="#0284c7" stroke-width="3"/>
    <text x="110" y="168" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#075985">Frontend</text>
    <rect x="190" y="125" width="120" height="70" rx="16" fill="#dcfce7" stroke="#16a34a" stroke-width="3"/>
    <text x="250" y="168" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#14532d">Backend</text>
    <rect x="330" y="125" width="120" height="70" rx="16" fill="#ffedd5" stroke="#ea580c" stroke-width="3"/>
    <text x="390" y="168" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#9a3412">Storage</text>
    <path d="M170 145h18" stroke="#334155" stroke-width="4" marker-end="url(#arrow)"/>
    <path d="M190 178h-18" stroke="#334155" stroke-width="4" marker-end="url(#arrow)"/>
    <path d="M110 210 C170 315,300 315,390 210" stroke="#0f766e" stroke-width="6" fill="none" marker-end="url(#arrowGreen)"/>
    <text x="250" y="255" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" fill="#334155">backend ออก URL ชั่วคราว</text>
    <text x="250" y="305" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" fill="#334155">frontend upload ตรงไป storage</text>
    <text x="250" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#14532d">เหมาะกับ production มากกว่า</text>
  </g>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#0f766e"/>
    </marker>
  </defs>
</svg>
